name: Quality

on:
  pull_request:
  push:
    branches: [ "main", "master", "NRT-Base" ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        run: chmod +x ./mvnw && ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music-party-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: music-party-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test:run
      - name: Build frontend
        run: npm run build
